name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOSTNAME: ${{ secrets.HOST_DNS }}
          USER_NAME: ${{ secrets.USERNAME }}
        run: |
          echo "$PRIVATE_KEY" | base64 -d > private_key
          chmod 600 private_key
          ssh -o StrictHostKeyChecking=no -i private_key ${USER_NAME}@${HOSTNAME} 'cd /var/www/html && sudo git pull origin main'
```

Make sure there's **nothing after that last line** — no extra text, no backticks, no "Save it and push" text. Delete everything else.

Save, then in VS Code terminal:
```
git add .
```
```
git commit -m "Fix yaml file"
```
```
git push origin main